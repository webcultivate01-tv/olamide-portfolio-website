<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Services - Olamide Andrew</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              gold: "#B8912A",
              "gold-light": "#D4A93C",
              dark: "#0F0F0D",
              "dark-2": "#181815",
            },
            fontFamily: {
              display: ["Playfair Display", "serif"],
              body: ["DM Sans", "sans-serif"],
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "DM Sans", sans-serif;
      }
      .font-display {
        font-family: "Playfair Display", serif;
      }
      .nav-a:hover {
        color: #b8912a;
      }
    </style>
  </head>
  <body class="bg-[#0F0F0D] text-white">
    <nav
      class="flex items-center justify-between px-8 md:px-20 py-5 border-b border-white/10"
    >
      <a
        href="index.html"
        class="px-5 py-2 border border-[#B8912A] text-[#B8912A] text-xs tracking-[0.2em] uppercase font-medium"
        >Olamide Andrew</a
      >
      <div class="hidden md:flex gap-8 text-sm text-white/70">
        <a href="index.html" class="nav-a transition-colors">Home</a>
        <a href="about.html" class="nav-a transition-colors">About</a>
        <a href="services.html" class="nav-a transition-colors text-[#B8912A]"
          >Services</a
        >
        <a href="work.html" class="nav-a transition-colors">Work</a>
        <a href="contact.html" class="nav-a transition-colors">Contact</a>
      </div>
      <button
        type="button"
        class="md:hidden text-white/80 hover:text-[#B8912A] transition-colors"
        aria-label="Open menu"
        data-menu-toggle
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-7 h-7"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="1.8"
            d="M4 7h16M4 12h16M4 17h16"
          />
        </svg>
      </button>
    </nav>
    <div
      id="mobile-menu-backdrop"
      class="md:hidden fixed inset-0 bg-black/60 opacity-0 pointer-events-none transition-opacity duration-300 z-40"
    ></div>
    <aside
      id="mobile-menu"
      class="md:hidden fixed top-0 right-0 h-full w-72 max-w-[85vw] bg-[#181815] border-l border-[#B8912A]/40 transform translate-x-full transition-transform duration-300 ease-out z-50 p-8"
    >
      <div class="flex items-center justify-between mb-10">
        <p class="text-xs tracking-[0.2em] uppercase text-[#B8912A]">Menu</p>
        <button
          type="button"
          class="text-white/70 hover:text-[#B8912A] transition-colors"
          aria-label="Close menu"
          data-menu-close
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-6 h-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.8"
              d="M6 6l12 12M18 6L6 18"
            />
          </svg>
        </button>
      </div>
      <nav class="flex flex-col gap-6 text-base text-white/85">
        <a href="index.html" class="nav-a">Home</a>
        <a href="about.html" class="nav-a">About</a>
        <a href="services.html" class="nav-a text-[#B8912A]">Services</a>
        <a href="work.html" class="nav-a">Work</a>
        <a href="contact.html" class="nav-a">Contact</a>
      </nav>
    </aside>
    <section class="px-8 md:px-20 py-20 min-h-[75vh]">
      <p class="text-[10px] tracking-[0.35em] text-[#B8912A] uppercase mb-5">
        Services
      </p>
      <h1 class="font-display text-4xl md:text-6xl font-bold mb-8">Services</h1>
      <p class="text-white/70 max-w-2xl leading-relaxed">
        Strategic brand design services including positioning, visual identity
        systems, and campaign design.
      </p>
    </section>
    <script>
      (function () {
        const menu = document.getElementById("mobile-menu");
        const backdrop = document.getElementById("mobile-menu-backdrop");
        const openBtn = document.querySelector("[data-menu-toggle]");
        const closeBtn = document.querySelector("[data-menu-close]");
        if (!menu || !backdrop || !openBtn || !closeBtn) return;

        const closeMenu = () => {
          menu.classList.add("translate-x-full");
          backdrop.classList.add("opacity-0", "pointer-events-none");
          document.body.style.overflow = "";
        };

        const openMenu = () => {
          menu.classList.remove("translate-x-full");
          backdrop.classList.remove("opacity-0", "pointer-events-none");
          document.body.style.overflow = "hidden";
        };

        openBtn.addEventListener("click", openMenu);
        closeBtn.addEventListener("click", closeMenu);
        backdrop.addEventListener("click", closeMenu);
        menu.querySelectorAll("a").forEach((link) => link.addEventListener("click", closeMenu));
        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape") closeMenu();
        });
      })();
    </script>
  </body>
</html>
